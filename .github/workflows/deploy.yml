name: Deploy Docker (Ubuntu self-hosted)

# Tailscale/SSH 불필요 — Ubuntu 서버에 Self-hosted Runner가 직접 deploy-docker.sh 실행
# master push · PR merge · workflow_dispatch 시 배포

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-ubuntu
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 45

    steps:
      - name: Deploy (git pull + docker compose)
        run: bash /home/jeon/apps/horizon/scripts/deploy-docker.sh

      - name: Health check
        run: curl -sf http://localhost:9080/api/health
