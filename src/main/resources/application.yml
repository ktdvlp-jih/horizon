server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: horizon
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:55432/horizon}
    username: ${SPRING_DATASOURCE_USERNAME:horizon}
    password: ${SPRING_DATASOURCE_PASSWORD:horizon}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: Asia/Seoul
  jackson:
    time-zone: Asia/Seoul
    serialization:
      write-dates-as-timestamps: false

jwt:
  secret: ${JWT_SECRET:horizon-dev-jwt-secret-change-me-in-production}
  access-token-expiration: 1800
  refresh-token-expiration: 1209600

horizon:
  cors:
    origins: ${HORIZON_CORS_ORIGINS:http://localhost:5173,http://localhost:5174}
  serve-frontend: ${HORIZON_SERVE_FRONTEND:false}
  auth:
    seed-admin: ${HORIZON_AUTH_SEED_ADMIN:true}
  settings:
    encryption-key: ${HORIZON_SETTINGS_ENCRYPTION_KEY:horizon-dev-settings-key-32b!}
  ai:
    base-url: ${HORIZON_AI_SERVICE_URL:http://localhost:9800}
    connect-timeout: 5s
    read-timeout: 120s
  weather:
    kma:
      api-key: ${HORIZON_KMA_API_KEY:}
      apihub-base-url: ${HORIZON_KMA_APIHUB_BASE_URL:https://apihub.kma.go.kr}
      pm10-path: ${HORIZON_KMA_PM10_PATH:/api/typ01/url/dst_pm10_hr.php}
      normals-path: ${HORIZON_KMA_NORMALS_PATH:/api/typ01/url/sun_sfc_norm.php}
      normals-tmst: ${HORIZON_KMA_NORMALS_TMST:2021}
      living-base-path: ${HORIZON_KMA_LIVING_BASE_PATH:/api/typ02/openApi/LivingWthrIdxServiceV3}
    asos:
      # apihub = 기상청 API허브 authKey (기본) | portal = 공공데이터포털 serviceKey
      provider: ${HORIZON_ASOS_PROVIDER:apihub}
      temp-path: ${HORIZON_ASOS_TEMP_PATH:/api/typ01/url/kma_sfctm2.php}
      solar-path: ${HORIZON_ASOS_SOLAR_PATH:/api/typ01/cgi-bin/url/nph-sun_sfc_sts_pkg}
      base-url: ${HORIZON_ASOS_BASE_URL:http://apis.data.go.kr/1360000/AsosHourlyInfoService}
      data-path: ${HORIZON_ASOS_DATA_PATH:/getWthrDataList}

logging:
  level:
    com.horizon: INFO
